<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Additional Excercices for Modal Window Topic</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2 class="excecise-number">Excercise 01</h2>
    <button class="show-error">Покажи грешка</button>
    <button class="close-error">Затвори</button>

    <!-- Този параграф по подразбиране е скрит в CSS чрез клас .hidden -->
    <p class="error-msg hidden">Нещо се обърка! Моля, опитайте отново.</p>

    <h2 class="excecise-number">Excercise 02</h2>
    <button class="alert-btn">Бутон 1</button>
    <button class="alert-btn">Бутон 2</button>
    <button class="alert-btn">Бутон 3</button>

    <p class="alert-text hidden">Вие кликнахте на един от бутоните!</p>
    <script src="script.js"></script>
  </body>
</html>
