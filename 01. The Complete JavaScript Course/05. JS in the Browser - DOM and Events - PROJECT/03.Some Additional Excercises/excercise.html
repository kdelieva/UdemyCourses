<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercises</title>
  </head>
  <body>
    <!-- Excercise 01 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 01</p>
    <h1 class="main-title">Добре дошли в курса!</h1>
    <button class="change-btn">Промени заглавието</button>

    <!-- Excercise 02 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 02</p>
    <p class="counter-text">
      Брой кликове: <span class="clicks-count">0</span>
    </p>
    <button class="click-btn">Кликни ме!</button>

    <!-- Excercise 03 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 03</p>
    <input type="text" class="user-input" placeholder="Напиши нещо..." />
    <button class="submit-btn">Изпрати</button>
    <p class="display-text">Ти написа: <span class="result-text">...</span></p>

    <!-- Excercise 04 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 04</p>
    <div
      class="box"
      style="width: 100px; height: 100px; background-color: red"
    ></div>
    <button class="style-btn">Направи ме голям и зелен!</button>

    <!-- Excercise 05 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 05</p>

    <h1 class="status-text">Играта започна!</h1>
    <input type="number" class="score-input" value="10" />
    <button class="reset-btn">Нулирай</button>

    <!-- Excercise 06 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 06</p>

    <input type="text" class="name-input" placeholder="Въведи име..." />
    <button class="check-btn">Провери</button>
    <p class="message">...</p>

    <!-- Excercise 07 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 07</p>
    <h2 class="lucky-number">?</h2>
    <button class="roll-btn">Генерирай късметлийско число</button>

    <!-- Excercise 08 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 08</p>
    <input
      type="number"
      class="guess-input"
      placeholder="Въведи число от 1 до 10"
    />
    <button class="guess-btn">Познай</button>
    <p class="hint-message">Направи своя опит...</p>

    <!-- Excercise 09 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 09</p>
    <div
      class="theme-box"
      style="width: 150px; height: 150px; border: 1px solid black"
    ></div>
    <button class="toggle-btn">Смени темата</button>

    <!-- Excercise 10 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 10</p>
    <p>Текущ резултат: <span class="current-score">15</span></p>
    <p>Най-висок резултат (Highscore): <span class="highscore-text">0</span></p>
    <button class="save-btn">Запази рекорд</button>

    <script src="excercise.js"></script>
  </body>
</html>
