<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercises</title>
  </head>
  <body>
    <!-- Excercise 01 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 01</p>
    <h1 class="main-title">Добре дошли в курса!</h1>
    <button class="change-btn">Промени заглавието</button>

    <!-- Excercise 02 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 02</p>
    <p class="counter-text">
      Брой кликове: <span class="clicks-count">0</span>
    </p>
    <button class="click-btn">Кликни ме!</button>

    <!-- Excercise 03 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 03</p>
    <input type="text" class="user-input" placeholder="Напиши нещо..." />
    <button class="submit-btn">Изпрати</button>
    <p class="display-text">Ти написа: <span class="result-text">...</span></p>

    <!-- Excercise 04 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 04</p>
    <div
      class="box"
      style="width: 100px; height: 100px; background-color: red"
    ></div>
    <button class="style-btn">Направи ме голям и зелен!</button>

    <!-- Excercise 05 -->
    <p style="color: red; font-weight: 700; font-size: 30px">Excercise 05</p>

    <h1 class="status-text">Играта започна!</h1>
    <input type="number" class="score-input" value="10" />
    <button class="reset-btn">Нулирай</button>






    
    <script src="excercise.js"></script>
  </body>
</html>
